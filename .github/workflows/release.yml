name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Determine build environment
        id: build-env
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -like "*-canary*") {
            echo "env=canary" >> $env:GITHUB_OUTPUT
          } else {
            echo "env=stable" >> $env:GITHUB_OUTPUT
          }

      - name: Build app
        shell: pwsh
        run: |
          if ("${{ steps.build-env.outputs.env }}" -eq "canary") {
            bun run build:canary
          } else {
            bun run build:stable
          }

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: ${{ steps.build-env.outputs.env == 'canary' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}